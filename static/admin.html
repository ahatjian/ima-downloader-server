<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMA 下载助手 Pro - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 220px; background: #1a1a2e;
      padding: 20px 0; border-right: 1px solid #2d2d44;
    }
    .sidebar h2 {
      font-size: 16px; color: #a855f7;
      padding: 0 20px; margin-bottom: 24px;
    }
    .sidebar a {
      display: block; padding: 12px 20px;
      color: #999; text-decoration: none;
      font-size: 14px; transition: all 0.2s;
    }
    .sidebar a:hover, .sidebar a.active {
      color: white; background: #2d2d44;
      border-left: 3px solid #a855f7;
    }

    .main { margin-left: 220px; padding: 24px; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #1a1a2e; border-radius: 12px;
      padding: 20px; text-align: center;
    }
    .stat-card .num { font-size: 32px; font-weight: 700; color: #a855f7; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }

    .card {
      background: #1a1a2e; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
    }
    .card h3 { font-size: 16px; color: #a855f7; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 10px; text-align: left; font-size: 12px; border-bottom: 1px solid #2d2d44; }
    th { color: #888; font-weight: 600; white-space: nowrap; }
    tr:hover td { background: #1e1e32; }

    .btn {
      padding: 6px 14px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .btn-primary { background: #a855f7; color: white; }
    .btn-primary:hover { background: #9333ea; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-danger:hover { background: #bb2d3b; }
    .btn-success { background: #28a745; color: white; }
    .btn-success:hover { background: #218838; }
    .btn-warning { background: #f59e0b; color: #1a1008; }
    .btn-warning:hover { background: #d97706; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 500;
    }
    .badge-active { background: rgba(40,167,69,0.2); color: #28a745; }
    .badge-disabled { background: rgba(220,53,69,0.2); color: #dc3545; }
    .badge-admin { background: rgba(168,85,247,0.2); color: #a855f7; }
    .badge-day { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .badge-month { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .badge-year { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-expired { background: rgba(220,53,69,0.2); color: #dc3545; }

    input, select {
      background: #2d2d44; border: 1px solid #3d3d5c;
      border-radius: 6px; padding: 8px 10px; color: #e0e0e0;
      font-size: 13px; outline: none;
    }
    input:focus, select:focus { border-color: #a855f7; }
    input[type="number"] { width: 70px; }

    .form-row {
      display: flex; gap: 10px; margin-bottom: 10px;
      align-items: center; flex-wrap: wrap;
    }
    .form-row label { font-size: 13px; color: #999; min-width: 50px; }
    .form-row input[type="email"],
    .form-row input[type="password"],
    .form-row input[type="text"] { flex: 1; min-width: 150px; }

    .login-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15,15,26,0.95); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #1a1a2e; border-radius: 16px; padding: 32px;
      width: 360px;
    }
    .login-box h2 { color: #a855f7; margin-bottom: 20px; text-align: center; }
    .login-box input {
      width: 100%; background: #2d2d44; border: 1px solid #3d3d5c;
      border-radius: 8px; padding: 12px; color: #e0e0e0;
      font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #a855f7; }
    .login-box .btn { width: 100%; padding: 12px; font-size: 14px; }
    .login-box .hint { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }

    .hidden { display: none !important; }

    .expired-text { color: #dc3545; font-weight: 600; }
    .msg { font-size: 12px; margin-top: 4px; }
    .msg-success { color: #28a745; }
    .msg-error { color: #dc3545; }
  </style>
</head>
<body>

<!-- 登录 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 管理员登录</h2>
    <input type="email" id="adminEmail" placeholder="管理员邮箱" value="2051645018@qq.com" />
    <input type="password" id="adminPassword" placeholder="管理员密码" value="" />
    <button class="btn btn-primary" id="adminLoginBtn">登录</button>
    <p class="hint">管理员使用固定密码登录</p>
  </div>
</div>

<!-- 侧边栏 -->
<div class="sidebar hidden" id="sidebar">
  <h2>⚡ 管理后台</h2>
  <a href="#" class="active" onclick="showPage('dashboard')">📊 仪表盘</a>
  <a href="#" onclick="showPage('users')">👥 用户管理</a>
</div>

<!-- 主内容 -->
<div class="main hidden" id="mainContent">
  <!-- 仪表盘 -->
  <div id="page-dashboard">
    <h2 style="margin-bottom:20px;">📊 仪表盘</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="s-totalUsers">-</div>
        <div class="label">总用户数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="s-activeUsers">-</div>
        <div class="label">活跃用户</div>
      </div>
      <div class="stat-card">
        <div class="num" id="s-totalDownloads">-</div>
        <div class="label">总下载次数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="s-quotaUsed">-</div>
        <div class="label">配额已用</div>
      </div>
    </div>
  </div>

  <!-- 用户管理 -->
  <div id="page-users" class="hidden">
    <h2 style="margin-bottom:20px;">👥 用户管理</h2>

    <!-- 创建用户 -->
    <div class="card">
      <h3>➕ 创建用户</h3>
      <div class="form-row">
        <label>邮箱</label>
        <input type="email" id="newEmail" placeholder="user@example.com" />
      </div>
      <div class="form-row">
        <label>密码</label>
        <input type="password" id="newPassword" placeholder="至少6位" />
        <label>昵称</label>
        <input type="text" id="newName" placeholder="可选" style="flex:0.6;min-width:100px" />
      </div>
      <div class="form-row">
        <label>配额</label>
        <input type="number" id="newQuota" value="100" min="1" />
        <label>订阅</label>
        <select id="newSubType">
          <option value="">无限期</option>
          <option value="day">日卡 (1天)</option>
          <option value="month">月卡 (30天)</option>
          <option value="year">年卡 (365天)</option>
        </select>
        <button class="btn btn-success" id="createUserBtn">创建用户</button>
      </div>
      <p id="createMsg" class="msg hidden"></p>
    </div>

    <!-- 用户列表 -->
    <div class="card">
      <h3>用户列表</h3>
      <p style="font-size:12px;color:#888;margin-bottom:12px;">💡 关闭公开注册，仅管理员可创建用户。修改配额后点 💾 保存。</p>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>邮箱</th>
            <th>配额</th>
            <th>已用</th>
            <th>剩余</th>
            <th>订阅</th>
            <th>到期时间</th>
            <th>状态</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api/v1';
let authToken = '';

// 登录
document.getElementById('adminLoginBtn').addEventListener('click', async () => {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value.trim();
  if (!email || !password) { alert('请输入邮箱和密码'); return; }

  try {
    const resp = await fetch(`${API}/auth/admin-login`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await resp.json();

    if (data.token && data.user?.role === 'admin') {
      authToken = data.token;
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('sidebar').classList.remove('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      loadDashboard();
      loadUsers();
    } else {
      alert(data.error || '登录失败或非管理员账号');
    }
  } catch (e) {
    alert('登录失败: ' + e.message);
  }
});

function apiFetch(path, options = {}) {
  return fetch(`${API}${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${authToken}`,
      ...options.headers
    }
  }).then(r => r.json());
}

async function loadDashboard() {
  const data = await apiFetch('/admin/stats');
  if (data.total_users !== undefined) {
    document.getElementById('s-totalUsers').textContent = data.total_users;
    document.getElementById('s-activeUsers').textContent = data.active_users;
    document.getElementById('s-totalDownloads').textContent = data.total_downloads;
    document.getElementById('s-quotaUsed').textContent = data.total_quota_used;
  }
}

// 订阅类型显示
function subTypeBadge(subType, isExpired) {
  if (!subType) return '<span style="color:#666">-</span>';
  const names = { day: '日卡', month: '月卡', year: '年卡' };
  const badgeClass = isExpired ? 'badge-expired' : `badge-${subType}`;
  const label = isExpired ? `${names[subType] || subType} ⚠` : (names[subType] || subType);
  return `<span class="badge ${badgeClass}">${label}</span>`;
}

function formatExpiry(expiresAt, isExpired) {
  if (!expiresAt) return '<span style="color:#666">-</span>';
  const d = expiresAt.split('T')[0];
  return isExpired ? `<span class="expired-text">${d} (已到期)</span>` : d;
}

async function loadUsers() {
  const data = await apiFetch('/admin/users?per_page=100');
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '';

  (data.users || []).forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.id}</td>
      <td>${u.email}</td>
      <td><input type="number" value="${u.quota_total}" id="qt-${u.id}" style="width:60px" /></td>
      <td>${u.quota_used}</td>
      <td style="color:#a855f7;font-weight:600">${u.quota_remaining}</td>
      <td>${subTypeBadge(u.subscription_type, u.is_subscription_expired)}</td>
      <td style="font-size:11px">${formatExpiry(u.subscription_expires_at, u.is_subscription_expired)}</td>
      <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-disabled'}">${u.is_active ? '活跃' : '禁用'}</span>
          ${u.role === 'admin' ? '<span class="badge badge-admin">管理员</span>' : ''}</td>
      <td style="font-size:11px;color:#666">${u.created_at?.split('T')[0] || '-'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-primary btn-sm" onclick="updateQuota(${u.id})" title="保存配额">💾</button>
        <button class="btn btn-warning btn-sm" onclick="showSubModal(${u.id})" title="修改订阅">📅</button>
        <button class="btn ${u.is_active ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleUser(${u.id})">${u.is_active ? '禁用' : '启用'}</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function updateQuota(userId) {
  const qt = document.getElementById(`qt-${userId}`).value;
  await apiFetch(`/admin/users/${userId}/quota`, {
    method: 'PUT',
    body: JSON.stringify({ quota_total: parseInt(qt) })
  });
  loadUsers();
}

async function showSubModal(userId) {
  const subType = prompt('输入订阅类型:\n- day (日卡/1天)\n- month (月卡/30天)\n- year (年卡/365天)\n- 留空 = 取消订阅/无限期', '');
  if (subType === null) return; // 取消

  const body = { subscription_type: subType.trim() };
  await apiFetch(`/admin/users/${userId}/subscription`, {
    method: 'PUT',
    body: JSON.stringify(body)
  });
  loadUsers();
}

async function toggleUser(userId) {
  await apiFetch(`/admin/users/${userId}/toggle`, { method: 'POST' });
  loadUsers();
}

// 创建用户
document.getElementById('createUserBtn').addEventListener('click', async () => {
  const email = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  const name = document.getElementById('newName').value.trim();
  const quota = parseInt(document.getElementById('newQuota').value) || 100;
  const subType = document.getElementById('newSubType').value;
  const msgEl = document.getElementById('createMsg');

  if (!email || !email.includes('@')) { showMsg('请输入正确的邮箱', 'error'); return; }
  if (!password || password.length < 6) { showMsg('密码至少6位', 'error'); return; }

  try {
    const body = { email, password, quota_total: quota, name };
    if (subType) body.subscription_type = subType;

    const data = await apiFetch('/admin/users', {
      method: 'POST',
      body: JSON.stringify(body)
    });

    if (data.id) {
      showMsg(`✅ 用户创建成功！邮箱: ${data.email}`, 'success');
      document.getElementById('newEmail').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newName').value = '';
      loadUsers();
    } else {
      showMsg(data.error || '创建失败', 'error');
    }
  } catch (e) {
    showMsg('创建失败: ' + e.message, 'error');
  }
});

function showMsg(text, type) {
  const el = document.getElementById('createMsg');
  el.textContent = text;
  el.className = `msg ${type === 'success' ? 'msg-success' : 'msg-error'}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(`page-${page}`).classList.remove('hidden');
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  event.target.classList.add('active');
}
</script>
</body>
</html>
